builder: dnf
distro: Ultramarine GNOME 44 (Xiaomi Pad 6)

import:
  - pipa.yaml

out_file: ultramarine-gnome-44-pipa.raw

bootloader: grub

kernel_cmdline: "quiet clk_ignore_unused pd_ignore_unused"

scripts:
  post:
    - id: grub
      name: Set up GRUB for pipa
      file: pipa-grub-setup.sh
    - id: pipa-services
      priority: 50
      name: Enable pipa services
      file: pipa-services.sh
    - id: pipa-user
      priority: 55
      name: Create default user
      file: pipa-user-setup.sh
    - id: default-target
      priority: 60
      name: Set default target to graphical
      file: pipa-default-target.sh

dnf:
  releasever: 44
  exec: dnf5
  arch: aarch64
  options:
    - --setopt=cachedir=/var/cache/dnf
    - --nogpgcheck
    - --setopt=keepcache=True
    - --allowerasing
    - --skip-unavailable
  packages:
    # Base system
    - filesystem
    - setup
    - glibc
    - glibc-common
    - dnf
    - dnf5
    - rpm
    - systemd
    - dracut
    - dracut-config-generic
    - NetworkManager
    - "@core"
    - fedora-repos
    - efibootmgr
    - sudo
    - passwd
    - util-linux
    - coreutils
    - bash
    - less
    - vim-minimal

    # Ultramarine release
    - ultramarine-release
    - ultramarine-release-common
    - ultramarine-release-gnome
    - ultramarine-release-identity-gnome
    - ultramarine-repos
    - terra-release

    # RPM Fusion
    - rpmfusion-free-release
    - rpmfusion-nonfree-release

    # aarch64 boot
    - grub2-efi-aa64
    - grub2-efi-aa64-modules
    - shim-aa64
    - grub2-tools

    # GNOME desktop
    - gnome-shell
    - gnome-session
    - gnome-settings-daemon
    - gnome-control-center
    - gnome-terminal
    - gnome-text-editor
    - nautilus
    - gdm
    - xdg-desktop-portal-gnome
    - xdg-user-dirs
    - xdg-user-dirs-gtk
    - gnome-software
    - gnome-disk-utility
    - gnome-system-monitor
    - gnome-tweaks
    - gnome-calculator
    - gnome-clocks
    - gnome-weather
    - evince
    - file-roller
    - loupe
    - snapshot

    # Hardware support
    - linux-firmware
    - pipewire
    - pipewire-pulseaudio
    - wireplumber
    - alsa-utils

  exclude:
    - generic-release*
    - kernel
    - kernel-core
    - kernel-debug*
    - kernel-devel*
    - kernel-modules*

disk:
  size: 8GiB
  partitions:
    - label: EFI
      type: esp
      size: 512MiB
      filesystem: efi
      mountpoint: /boot/efi

    - label: boot
      type: xbootldr
      size: 1GiB
      filesystem: ext4
      mountpoint: /boot

    - label: root
      flags:
        - grow-fs
      type: root
      filesystem: ext4
      mountpoint: /
