builder: dnf
distro: Ultramarine GNOME 44 (Xiaomi Pad 6)

import:
  - pipa.yaml

out_file: ultramarine-gnome-44-pipa.raw

bootloader: grub

kernel_cmdline: "quiet clk_ignore_unused pd_ignore_unused"

scripts:
  post:
    - id: grub
      name: Set up GRUB for pipa
      file: pipa-grub-setup.sh
    - id: pipa-services
      priority: 50
      name: Enable pipa services
      file: pipa-services.sh
    - id: pipa-firstboot
      priority: 55
      name: Install first-boot setup wizard
      file: pipa-firstboot-install.sh
    - id: pipa-validate
      priority: 58
      name: Validate pipa hardware payloads
      file: pipa-validate-hardware.sh
    - id: default-target
      priority: 60
      name: Set default target to graphical
      file: pipa-default-target.sh

dnf:
  releasever: 44
  exec: dnf5
  arch: aarch64
  repodir: repodir/
  options:
    - --setopt=cachedir=/var/cache/dnf
    - --nogpgcheck
    - --setopt=keepcache=True
    - --setopt=tsflags=
    - --setopt=max_parallel_downloads=20
    - --setopt=install_weak_deps=True
    - --allowerasing
    - --skip-unavailable
    - --skip-broken
    - --nobest
  packages:
    # Base system (Ultramarine base-disk + base)
    - filesystem
    - setup
    - glibc
    - glibc-common
    - dnf
    - dnf5
    - rpm
    - systemd
    - dracut
    - dracut-config-generic
    - dracut-tools
    - NetworkManager
    - "@core"
    - "@standard"
    - "@hardware-support"
    - fedora-repos
    - efibootmgr
    - sudo
    - passwd
    - util-linux
    - coreutils
    - bash
    - nano
    - ultramarine-raw-filesystem
    - plymouth
    - plymouth-system-theme
    - plymouth-theme-spinner
    - ultramarine-release-common
    - ultramarine-release
    - ultramarine-repos
    - ultramarine-logos
    - terra-release
    - taidan-ultramarine-configs

    # RPM Fusion
    - rpmfusion-free-release
    - rpmfusion-nonfree-release

    # aarch64 boot
    - grub2-efi-aa64
    - grub2-efi-aa64-modules
    - shim-aa64
    - grub2-tools

    # Full Ultramarine GNOME desktop
    - "@ultramarine-gnome-product-environment"
    - "@ultramarine-gnome-no-flatpak-apps"
    - "@libreoffice"
    - ultramarine-release-gnome
    - ultramarine-release-identity-gnome

    # Pipa-specific extras
    - iwd
    - zenity
    - openssh-server
    - systemd-resolved

  exclude:
    - fedora-release*
    - generic-release*
    - kernel
    - kernel-core
    - kernel-debug*
    - kernel-devel*
    - kernel-modules*
    - initial-setup*
    - gnome-initial-setup
    - fedora-third-party
    - fedora-flathub-remote
    - fedora-workstation-repositories
    - setroubleshoot
    - setroubleshoot-plugins
    - setroubleshoot-server

disk:
  size: 16GiB
  partitions:
    - label: EFI
      type: esp
      size: 512MiB
      filesystem: efi
      mountpoint: /boot/efi

    - label: boot
      type: xbootldr
      size: 1GiB
      filesystem: ext4
      mountpoint: /boot

    - label: root
      flags:
        - grow-fs
      type: root
      filesystem: ext4
      mountpoint: /
